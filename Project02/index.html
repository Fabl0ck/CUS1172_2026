<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Task Manager</title>
</head>
<body class="container mt-5">
    <h2 class="mb-4">Project 02: Task List</h2>

    <form id="taskForm" class="card p-4 mb-4">
        <div class="mb-3">
            <label class="form-label">Task Title</label>
            <input type="text" id="taskTitle" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Priority</label>
            <select id="taskPriority" class="form-select">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label d-block">Status</label>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="status" value="pending" checked>
                <label class="form-check-label">Pending</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="status" value="completed">
                <label class="form-check-label">Completed</label>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Add Task</button>
    </form>

    <ul id="taskList" class="list-group"></ul>

    <script src="script.js"></script>
</body>
</html>
